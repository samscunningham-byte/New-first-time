<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Script Recorder Modal</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#5b13ec",
                        "background-light": "#f6f6f8",
                        "background-dark": "#161022",
                    },
                    fontFamily: {
                        "display": ["Manrope"]
                    },
                    borderRadius: {"DEFAULT": "1rem", "lg": "2rem", "xl": "3rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .teleprompter-mask {
            mask-image: linear-gradient(to bottom, transparent, black 20%, black 80%, transparent);
        }
        .glass-panel {
            background: rgba(22, 16, 34, 0.6);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
    </style>
</head>
<body class="bg-background-light dark:bg-background-dark font-display overflow-hidden h-screen w-screen">
<!-- Full Screen Recording Simulation Background -->
<div class="absolute inset-0 z-0 bg-cover bg-center" data-alt="A content creator sitting in a clean home office with soft lighting" style='background-image: url("https://lh3.googleusercontent.com/aida-public/AB6AXuB9UY1aaP87881RzZC7Upok8Lx2jgUsRtNKbhKU4QcTI5IbtFf8sl_teqJeTAB4--5cAG7rUyf7fVu5unMxXSeDf3Yu4tMG6QtOy77I4foWITVx0r6zgmspHU1ROnBBkb9rlDzBc5RxPGiuN2aYmbM4mnhHcGragIn7cNcALYiKz5oEvhXxHTl5Dq3YhDwDm8qf3bTSIFajlJq83Xnd1okRQyk-3L1rJNGRiR0UBfRmZ6nOhexLnr0RN72bw8cuSseQtfHHCl54-nM");'>
<!-- Overlay for contrast -->
<div class="absolute inset-0 bg-black/30"></div>
</div>
<!-- HUD Top Bar -->
<div class="relative z-10 flex items-center justify-between p-8">
<div class="flex items-center gap-4 glass-panel px-6 py-2 rounded-full">
<div class="flex items-center gap-2">
<div class="size-2 rounded-full bg-red-500 animate-pulse"></div>
<span class="text-white text-sm font-bold tracking-widest uppercase">REC</span>
</div>
<div class="h-4 w-px bg-white/20"></div>
<!-- Timer Component -->
<div class="flex gap-2">
<p class="text-white text-sm font-bold leading-tight">00:12:45</p>
</div>
</div>
<button class="glass-panel size-12 rounded-full flex items-center justify-center text-white hover:bg-white/10 transition-colors">
<span class="material-symbols-outlined">close</span>
</button>
</div>
<!-- Teleprompter Section -->
<div class="relative z-10 flex flex-col items-center justify-center px-4 mt-12 teleprompter-mask h-[40vh]">
<div class="max-w-[800px] w-full text-center">
<!-- HeadlineText Component -->
<h1 class="text-white tracking-tight text-[42px] font-bold leading-[1.3] drop-shadow-2xl">
                I left my 9-5 job 2 years ago. My winning strategy is a counterintuitive approach.
            </h1>
<p class="text-white/60 text-2xl font-medium mt-8 leading-relaxed">
                Most people think you need a massive audience to start, but the truth is...
            </p>
</div>
</div>
<!-- Layout Container for Controls -->
<div class="fixed inset-x-0 bottom-0 z-20 pb-12 flex flex-col items-center gap-8">
<!-- Controls Dock -->
<div class="glass-panel px-8 py-4 rounded-full flex items-center gap-10 shadow-2xl">
<!-- Utility Toggles -->
<div class="flex items-center gap-2">
<button class="size-10 rounded-full flex items-center justify-center text-white/80 hover:bg-white/10">
<span class="material-symbols-outlined">mic</span>
</button>
<button class="size-10 rounded-full flex items-center justify-center text-white/80 hover:bg-white/10">
<span class="material-symbols-outlined">videocam</span>
</button>
</div>
<div class="h-10 w-px bg-white/10"></div>
<!-- Record Button (FAB style) -->
<div class="relative">
<div class="absolute inset-0 bg-primary/40 rounded-full blur-xl animate-pulse"></div>
<button class="relative flex size-20 items-center justify-center rounded-full bg-primary text-white shadow-lg transform active:scale-95 transition-all">
<span class="material-symbols-outlined !text-[32px]" style="font-variation-settings: 'FILL' 1">radio_button_checked</span>
</button>
</div>
<div class="h-10 w-px bg-white/10"></div>
<!-- Slider Component (Teleprompter Speed) -->
<div class="flex items-center gap-4 min-w-[240px]">
<span class="material-symbols-outlined text-white/60 text-sm">potted_plant</span> <!-- Turtle-ish -->
<div class="flex-1 flex flex-col gap-1">
<div class="flex h-1.5 w-full items-center rounded-full bg-white/20">
<div class="h-full w-[45%] rounded-full bg-primary"></div>
<div class="size-4 rounded-full bg-white shadow-md -ml-2 cursor-pointer border-2 border-primary"></div>
</div>
</div>
<span class="material-symbols-outlined text-white/60 text-sm">bolt</span> <!-- Rabbit-ish -->
</div>
<!-- Settings FAB -->
<div class="flex items-center">
<button class="size-10 rounded-full flex items-center justify-center text-white/80 hover:bg-white/10">
<span class="material-symbols-outlined">settings</span>
</button>
</div>
</div>
<!-- Footer Caption Hint -->
<p class="text-white/40 text-xs uppercase tracking-[0.2em] font-bold">
            Camera Active • 1080p 60fps
        </p>
</div>
<!-- Side HUD (Microphone Level) -->
<div class="fixed right-8 top-1/2 -translate-y-1/2 flex flex-col items-center gap-2">
<div class="h-48 w-2 glass-panel rounded-full relative overflow-hidden">
<div class="absolute bottom-0 w-full bg-green-400 h-[65%] rounded-b-full"></div>
<div class="absolute bottom-[65%] w-full bg-yellow-400 h-[15%]"></div>
</div>
<span class="material-symbols-outlined text-white/40 text-sm">equalizer</span>
</div>
</body></html>
