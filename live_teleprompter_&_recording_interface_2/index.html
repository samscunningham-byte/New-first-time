<!DOCTYPE html>
<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Recorder with 3-Second Countdown</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#5b13ec",
                        "background-light": "#f6f6f8",
                        "background-dark": "#161022",
                    },
                    fontFamily: {
                        "display": ["Spline Sans", "sans-serif"]
                    },
                    borderRadius: { "DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px" },
                },
            },
        }
    </script>
<style type="text/tailwindcss">
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .waveform-bar {
            width: 3px;
            background-color: #5b13ec;
            border-radius: 2px;
        }
        .countdown-number {
            -webkit-text-stroke: 2px #5b13ec;
            paint-order: stroke fill;
            text-shadow: 0 0 40px rgba(91, 19, 236, 0.6);
        }
        .loader-ring {
            border: 3px solid rgba(255, 255, 255, 0.2);
            border-top: 3px solid white;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body class="bg-background-light dark:bg-background-dark font-display text-white overflow-hidden">
<div class="relative flex h-screen w-full flex-col">
<header class="flex items-center justify-between border-b border-white/10 bg-background-dark/80 backdrop-blur-md px-8 py-3 z-50">
<div class="flex items-center gap-4">
<div class="size-6 text-primary">
<svg fill="none" viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
<path d="M4 4H17.3334V17.3334H30.6666V30.6666H44V44H4V4Z" fill="currentColor"></path>
</svg>
</div>
<h2 class="text-white text-lg font-bold tracking-tight">Video Creator</h2>
</div>
<div class="flex items-center gap-4">
<div class="flex items-center gap-2 bg-white/5 px-3 py-1.5 rounded-lg border border-white/10">
<div class="size-2 rounded-full bg-white/20"></div>
<span class="text-white/40 font-bold text-sm">READY</span>
</div>
<div class="flex gap-2">
<button class="p-2 hover:bg-white/10 rounded-lg transition-colors">
<span class="material-symbols-outlined text-white">settings</span>
</button>
<button class="p-2 hover:bg-white/10 rounded-lg transition-colors">
<span class="material-symbols-outlined text-white">mic</span>
</button>
<button class="p-2 hover:bg-white/10 rounded-lg transition-colors">
<span class="material-symbols-outlined text-white">videocam</span>
</button>
</div>
</div>
</header>
<main class="flex flex-1 overflow-hidden relative">
<aside class="w-72 bg-background-dark border-r border-white/10 p-6 flex flex-col justify-between hidden lg:flex">
<div class="space-y-8">
<div>
<h3 class="text-xs uppercase tracking-widest text-white/50 font-bold mb-4">SLAY Progress</h3>
<div class="space-y-4">
<div class="flex items-center gap-3 p-3 rounded-xl bg-primary/20 border border-primary/30">
<span class="material-symbols-outlined text-primary" style="font-variation-settings: 'FILL' 1">radio_button_checked</span>
<div>
<p class="text-white text-sm font-bold leading-none">The Hook</p>
<p class="text-primary text-[10px] mt-1 uppercase font-bold tracking-tighter">Preparing...</p>
</div>
</div>
<div class="flex items-center gap-3 p-3 rounded-xl opacity-40">
<span class="material-symbols-outlined text-white/40">play_circle</span>
<p class="text-white/60 text-sm font-medium">The Core</p>
</div>
<div class="flex items-center gap-3 p-3 rounded-xl opacity-40">
<span class="material-symbols-outlined text-white/40">circle</span>
<p class="text-white/60 text-sm font-medium">The Close</p>
</div>
</div>
</div>
<div>
<h3 class="text-xs uppercase tracking-widest text-white/50 font-bold mb-4">Audio Levels</h3>
<div class="flex items-end gap-1 h-12 px-2 opacity-30">
<div class="waveform-bar h-4"></div>
<div class="waveform-bar h-8"></div>
<div class="waveform-bar h-12"></div>
<div class="waveform-bar h-6"></div>
<div class="waveform-bar h-10"></div>
<div class="waveform-bar h-4"></div>
<div class="waveform-bar h-7"></div>
<div class="waveform-bar h-11"></div>
<div class="waveform-bar h-5"></div>
<div class="waveform-bar h-9"></div>
<div class="waveform-bar h-3"></div>
<div class="waveform-bar h-8"></div>
<div class="waveform-bar h-12"></div>
</div>
</div>
</div>
<button class="w-full py-3 bg-white/5 hover:bg-white/10 rounded-xl border border-white/10 text-sm font-bold transition-all">
                    View Full Script
                </button>
</aside>
<section class="flex-1 bg-black relative flex flex-col items-center justify-center">
<div class="absolute inset-0 bg-cover bg-center opacity-70 blur-md scale-105" style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuB9LgcQemTw8TA37DKo8VGKkavgdqDJ0gu03wR0QMOvUZthElVTjFKpkN2h3JMjkEMyn58VsgUPTTUU9kzTY_lakawYntsbvB4jo2dBOo0LFODnggcTVpRABun-2esk7AC4hIUJrKu_4CKdgWEFCHqN7LG8fs2WVUHnPH0UOoYq3TRNgks7JLdm3vVq9teeepplm5W-RapoxgOyIcqNzOxMwcJkW1FZWlloQfpusVgwnv3XC5h-FmkpFKAllXdsn7OrSxIpOZ4UGN0');"></div>
<div class="relative z-30 pointer-events-none">
<span class="countdown-number text-[24rem] font-black text-white/10 leading-none">3</span>
</div>
<div class="absolute z-10 w-full max-w-2xl px-6 top-12 opacity-40">
<div class="bg-black/60 backdrop-blur-xl border border-white/10 rounded-2xl p-8 shadow-2xl">
<div class="flex justify-center mb-4">
<div class="px-3 py-1 bg-white/20 rounded-full text-[10px] font-bold uppercase tracking-widest">Script Paused</div>
</div>
<h2 class="text-white text-3xl font-bold leading-tight text-center">
                            I left my 9-5 job 2 years ago. <span class="text-white/60">My winning strategy is a counterintuitive approach.</span>
</h2>
</div>
</div>
<div class="absolute bottom-32 z-10 opacity-30">
<div class="bg-white/10 px-6 py-3 rounded-lg border border-white/10 transform -rotate-1">
<p class="text-white text-2xl font-black uppercase italic tracking-tighter">My winning strategy</p>
</div>
</div>
</section>
</main>
<footer class="bg-background-dark border-t border-white/10 px-8 py-6 z-50">
<div class="max-w-6xl mx-auto flex items-center justify-between">
<div class="flex items-center gap-4 opacity-50 pointer-events-none">
<div class="flex flex-col">
<span class="text-[10px] text-white/40 uppercase font-bold tracking-wider mb-1">Scroll Speed</span>
<div class="flex bg-white/5 p-1 rounded-lg border border-white/10">
<button class="px-3 py-1 text-xs font-bold rounded-md">0.8x</button>
<button class="px-3 py-1 text-xs font-bold rounded-md bg-white/10 text-white">1.0x</button>
<button class="px-3 py-1 text-xs font-bold rounded-md">1.2x</button>
</div>
</div>
</div>
<div class="flex flex-col items-center">
<button class="flex items-center justify-center gap-4 bg-primary/20 border-2 border-primary text-white px-10 py-4 rounded-full font-black text-lg uppercase tracking-widest shadow-[0_0_40px_rgba(91,19,236,0.3)] transition-all">
<div class="loader-ring"></div>
                        Preparing...
                    </button>
</div>
<div class="flex items-center gap-6 opacity-50 pointer-events-none">
<div class="flex items-center gap-3">
<span class="text-sm font-bold text-white/80">Burn-in Captions</span>
<button class="w-12 h-6 bg-white/10 rounded-full relative flex items-center px-1">
<div class="size-4 bg-white/40 rounded-full"></div>
</button>
</div>
<button class="flex items-center gap-2 px-4 py-2 bg-white/5 rounded-xl border border-white/10 transition-colors">
<span class="material-symbols-outlined text-xl">closed_caption</span>
<span class="text-sm font-bold">Style Editor</span>
</button>
</div>
</div>
</footer>
<div class="fixed top-24 left-80 w-8 h-8 border-t-2 border-l-2 border-primary/60 pointer-events-none"></div>
<div class="fixed top-24 right-12 w-8 h-8 border-t-2 border-r-2 border-primary/60 pointer-events-none"></div>
<div class="fixed bottom-32 left-80 w-8 h-8 border-b-2 border-l-2 border-primary/60 pointer-events-none"></div>
<div class="fixed bottom-32 right-12 w-8 h-8 border-b-2 border-r-2 border-primary/60 pointer-events-none"></div>
</div>

</body></html>
